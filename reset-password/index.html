<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort zuruecksetzen - Keeply</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
        }

        .page {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            padding: 28px 16px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        header {
            text-align: center;
        }

        .logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
            display: inline-block;
        }

        .card {
            border: 1px solid #dedede;
            border-radius: 14px;
            padding: 22px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.45rem;
            line-height: 1.2;
            text-align: center;
        }

        .subtitle {
            margin: 0 0 18px;
            text-align: center;
            color: #4b5563;
            font-size: 0.95rem;
        }

        form {
            display: grid;
            gap: 16px;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 16px 48px 16px 16px;
            font-size: 1rem;
            background-color: #f4f5f8;
            color: #333333;
        }

        input[type="password"]:focus, input[type="text"]:focus {
            outline: 2px solid #6D9DC5;
            outline-offset: -1px;
            border-color: #6D9DC5;
            background-color: #ffffff;
        }

        input::placeholder {
            color: #6b7280;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .button {
            margin-top: 4px;
            border: none;
            border-radius: 10px;
            background-color: #6D9DC5;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px;
            cursor: pointer;
        }

        .button:hover {
            background-color: #5b89b0;
        }

        .message {
            margin: 0;
            min-height: 1.2em;
            font-size: 0.9rem;
            color: #b00020;
        }

        .message.success {
            color: #0a7f2e;
        }

        footer {
            border-top: 1px solid #ebebeb;
            padding: 16px;
            text-align: center;
            display: grid;
            gap: 10px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.95rem;
        }

        a {
            color: #6D9DC5;
            text-decoration: underline;
        }

        .copyright {
            margin: 0;
            font-size: 0.9rem;
            color: #333333;
        }

        @media (max-width: 360px) {
            .card {
                padding: 18px;
            }

            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header>
            <img class="logo" src="/assets/logo_black.svg" alt="Keeply Logo">
        </header>

        <section class="card" aria-labelledby="reset-heading">
            <h1 id="reset-heading">Neues Passwort erstellen</h1>
            <p class="subtitle">Bitte waehle ein neues Passwort und bestätige es.</p>

            <form id="reset-form" novalidate>
                <div>
                    <label for="new-password" class="visually-hidden">Neues Passwort</label>
                    <div class="input-wrapper">
                        <input id="new-password" name="new-password" type="password" placeholder="Neues Passwort" autocomplete="new-password" required>
                        <button type="button" class="toggle-password" aria-label="Passwort anzeigen" data-target="new-password">
                            <svg viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="confirm-password" class="visually-hidden">Passwort bestätigen</label>
                    <div class="input-wrapper">
                        <input id="confirm-password" name="confirm-password" type="password" placeholder="Passwort bestätigen" autocomplete="new-password" required>
                        <button type="button" class="toggle-password" aria-label="Passwort anzeigen" data-target="confirm-password">
                            <svg viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <p id="form-message" class="message" role="alert" aria-live="polite"></p>

                <button class="button" type="submit">Passwort speichern</button>
            </form>
        </section>
    </main>

    <footer>
        <nav class="footer-links" aria-label="Rechtliche Links">
            <a href="https://getkeepit.app//impressum/">Impressum</a>
            <a href="https://getkeepit.app//datenschutz/">Datenschutz</a>
            <a href="https://getkeepit.app//nutzungsbedingungen/">Nutzungsbedingungen</a>
        </nav>
        <p class="copyright">&copy; 2026 Keeply</p>
    </footer>

    <script>
        const form = document.getElementById("reset-form");
        const newPasswordInput = document.getElementById("new-password");
        const confirmPasswordInput = document.getElementById("confirm-password");
        const message = document.getElementById("form-message");

        // Toggle Password visibility
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const isPassword = input.getAttribute('type') === 'password';

                input.setAttribute('type', isPassword ? 'text' : 'password');
                this.setAttribute('aria-label', isPassword ? 'Passwort verbergen' : 'Passwort anzeigen');

                // Toggle SVG (Eye to Eye-off)
                if (isPassword) {
                    this.innerHTML = '<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
                } else {
                    this.innerHTML = '<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
                }
            });
        });

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            const newPassword = newPasswordInput.value.trim();
            const confirmPassword = confirmPasswordInput.value.trim();

            if (!newPassword || !confirmPassword) {
                message.className = "message";
                message.textContent = "Bitte beide Felder ausfuellen.";
                return;
            }

            if (newPassword !== confirmPassword) {
                message.className = "message";
                message.textContent = "Die Passwoerter stimmen nicht ueberein.";
                return;
            }

            message.className = "message success";
            message.textContent = "Passwort wurde erfolgreich gespeichert.";
            form.reset();
        });
    </script>
</body>
</html>
